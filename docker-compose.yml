version: "3.9"
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: research_factory
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d research_factory"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: ./backend
    command: uv run alembic upgrade head
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/research_factory
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/research_factory
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build: ./backend
    command: celery -A celery_app worker --loglevel=info
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/research_factory
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: development
    command: npm run dev
    environment:
      # Copy values from frontend/.env.local.example
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=test-secret-at-least-32-chars-long-for-e2e
      - GOOGLE_CLIENT_ID=replace-with-google-client-id
      - GOOGLE_CLIENT_SECRET=replace-with-google-client-secret
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
